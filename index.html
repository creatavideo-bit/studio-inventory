<style>

    --bg: #17181A;
    --surface: #212327;
    --surface-raised: #2A2D32;
    --border: #3A3D42;
    --text: #EDEDE6;
    --text-muted: #9A9DA3;
    --accent: #E8A33D;
    --accent-dim: #4A3D25;
    --ok: #7A9B76;
    --warn: #E8A33D;

    align-items: center;
    justify-content: space-between;

    margin-bottom: 14px;

  .photo-preview {

  .group-chip {
    display: flex; align-items: center; gap: 6px;

    border: 1px solid var(--border); background: var(--surface);

  .group-chip:hover { border-color: var(--accent); }
  .group-chip.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

  .active-filter-banner {

  const SUPABASE_URL = 'https://lnodjdgdavjfzivqbvpa.supabase.co';

  const LOG_TYPE_META = {
    purchase: { label:'購入', color:'var(--ok)' },
    loss: { label:'耗損', color:'var(--danger)' },
    adjustment: { label:'盤點調整', color:'var(--warn)' },

  function qtyOf(item){
    return (item.quantity === '' || item.quantity === null || item.quantity === undefined) ? null : Number(item.quantity);
  }

  function isLowStock(item){
    const q = qtyOf(item);
    const t = (item.lowStockThreshold === '' || item.lowStockThreshold === null || item.lowStockThreshold === undefined) ? null : Number(item.lowStockThreshold);
    if (q === null || t === null) return false;
    return q <= t;
  }

  function computeGroups(){
    const map = {};
    state.equipment.forEach(i=>{
      if (!i.groupName) return;
      if (!map[i.groupName]) map[i.groupName] = { name: i.groupName, totalQty: 0, items: [] };
      const q = qtyOf(i);
      map[i.groupName].totalQty += (q === null ? 1 : q);
      map[i.groupName].items.push(i);
    });
    const groups = Object.values(map);
    groups.forEach(g=>{
      const withThreshold = g.items.filter(i=> i.lowStockThreshold !== '' && i.lowStockThreshold !== null && i.lowStockThreshold !== undefined);
      if (withThreshold.length === g.items.length && g.items.length > 0){
        const totalThreshold = withThreshold.reduce((sum,i)=> sum + Number(i.lowStockThreshold), 0);
        g.lowStock = g.totalQty <= totalThreshold;
      } else {
        g.lowStock = false;
      }
    });
    return groups.sort((a,b)=> a.name.localeCompare(b.name));
  }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function overlaps(s1,e1,s2,e2){ return !(e1 < s2 || e2 < s1); }

  function computeStatus(item){
    if (item.condition === '已報廢') return { label:'已報廢', color:'var(--off)' };
    const today = todayStr();
    const active = state.projects.find(p => p.itemIds.includes(item.id) && overlaps(p.startDate,p.endDate,today,today));
    if (active) return { label:'使用中', color:'var(--warn)' };
    const upcoming = state.projects.find(p => p.itemIds.includes(item.id) && p.startDate > today);
    if (upcoming) return { label:'已預約', color:'var(--warn)' };
    if (item.condition === '待維修') return { label:'維修中', color:'var(--danger)' };
    return { label:'可用', color:'var(--ok)' };
  }

  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(()=> t.classList.remove('show'), 2200);
  }

    return {
      'apikey': SUPABASE_KEY,

  async function loadData(){
    try {
      const url = `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${encodeURIComponent(STORE_KEY)}&select=value`;
      const res = await fetch(url, { headers: supabaseHeaders() });
      if (!res.ok) throw new Error('讀取失敗: ' + res.status);
      const rows = await res.json();
      if (rows && rows[0] && rows[0].value) {
        const parsed = JSON.parse(rows[0].value);
        state.equipment = parsed.equipment || [];
        state.projects = parsed.projects || [];

      console.error(e);
      state = { equipment: [], projects: [], categories: DEFAULT_CATEGORIES.slice() };
    }

  }

    try {
      const url = `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?on_conflict=id`;
      const res = await fetch(url, {
        method: 'POST',
        headers: Object.assign(supabaseHeaders(), { 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
        body: JSON.stringify([{ id: STORE_KEY, value: JSON.stringify(state), updated_at: new Date().toISOString() }])
      });
      if (!res.ok) throw new Error('儲存失敗: ' + res.status);
    } catch(e){
      toast('儲存失敗，請檢查網路連線後再試一次');
      console.error(e);
    }
  }

  // ---------- image compression ----------
  function compressImage(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = (e)=>{
        const img = new Image();
        img.onload = ()=>{
          const maxDim = 640;
          let w = img.width, h = img.height;
          if (w > h && w > maxDim){ h = h*maxDim/w; w = maxDim; }
          else if (h > maxDim){ w = w*maxDim/h; h = maxDim; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.65));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---------- Stock movement modal ----------
  function openStockModal(itemId, type){
    const item = state.equipment.find(i=>i.id===itemId);
    if (!item) return;
    const currentQty = qtyOf(item) || 0;
    const titles = { purchase: '登記進貨', loss: '登記耗損 / 報廢', adjustment: '盤點修正數量' };
    const isAdjust = type === 'adjustment';

    openModal(`
      <div class="modal" style="max-width:400px;">
        <div class="modal-header">
          <div class="modal-title">${titles[type]}</div>
          <button class="close-x" id="close-stock">&times;</button>
        </div>
        <div class="hint-text" style="margin-bottom:12px;">目前數量：${currentQty}</div>
        <div class="field">
          <label>日期</label>
          <input type="date" id="s-date" value="${todayStr()}">
        </div>
        <div class="field">
          <label>${isAdjust ? '修正後正確數量' : (type==='purchase' ? '新增數量' : '耗損數量')}</label>
          <input type="number" id="s-amount" min="0" placeholder="${isAdjust ? currentQty : '例如：2'}">
        </div>
        <div class="field">
          <label>備註（選填）</label>
          <input type="text" id="s-note" placeholder="${type==='purchase' ? '例如：向 XX 店購入' : (type==='loss' ? '例如：拍攝中損壞' : '例如：盤點時發現短少')}">
        </div>
        <div class="modal-actions">
          <button class="btn" id="cancel-stock">取消</button>
          <button class="btn btn-primary" id="save-stock">儲存</button>
        </div>
      </div>
    `);
    document.getElementById('close-stock').addEventListener('click', ()=> openDetail(itemId));
    document.getElementById('cancel-stock').addEventListener('click', ()=> openDetail(itemId));
    document.getElementById('save-stock').addEventListener('click', async ()=>{
      const dateVal = document.getElementById('s-date').value || todayStr();
      const amountVal = document.getElementById('s-amount').value;
      const note = document.getElementById('s-note').value.trim();
      if (amountVal === '' || isNaN(Number(amountVal)) || Number(amountVal) < 0){ toast('請輸入有效的數字'); return; }

      const amount = Number(amountVal);
      let delta, newQty;
      if (type === 'purchase'){ delta = amount; newQty = currentQty + amount; }
      else if (type === 'loss'){ delta = -amount; newQty = Math.max(0, currentQty - amount); }
      else { newQty = amount; delta = amount - currentQty; }

      const entry = { id: uid(), date: dateVal, type, delta, quantityAfter: newQty, note, createdAt: Date.now() };
      const idx = state.equipment.findIndex(i=>i.id===itemId);
      if (!state.equipment[idx].quantityLog) state.equipment[idx].quantityLog = [];
      state.equipment[idx].quantityLog.push(entry);
      state.equipment[idx].quantity = newQty;

      const btn = document.getElementById('save-stock');
      btn.disabled = true; btn.textContent = '儲存中...';
      try {
        await saveData();
        toast('已更新數量');
        openDetail(itemId);
        render();
      } catch(e){
        toast('儲存失敗，請再試一次');
        btn.disabled = false; btn.textContent = '儲存';
      }
    });
  }

  // ---------- Equipment form ----------
  function openEquipmentForm(id){
    const editing = !!id;
    const item = editing ? state.equipment.find(i=>i.id===id) : {
      name:'', category:state.categories[0], brand:'', code:'', location:'', purchaseDate:'', price:'', condition:'良好', notes:'', hasPhoto:false, quantity:'', groupName:'', quantityLog:[], lowStockThreshold:''
    };
    let pendingPhotoDataUrl = null;
    let removePhoto = false;

    openModal(`
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${editing ? '編輯器材' : '新增器材'}</div>
          <button class="close-x" id="close-form">&times;</button>
        </div>
        <div class="photo-upload-area">
          <div class="photo-preview" id="photo-preview">
            ${item.hasPhoto ? '<span class="ph-icon">載入中...</span>' : '<span class="ph-icon">尚無照片</span>'}
          </div>
          <input type="file" accept="image/*" capture="environment" id="photo-input" style="display:none">
          <button class="btn btn-sm" id="btn-take-photo" type="button">📷 拍照 / 上傳照片</button>
          ${item.hasPhoto ? '<button class="btn btn-sm btn-ghost" id="btn-remove-photo" type="button" style="margin-left:8px;">移除照片</button>' : ''}
        </div>

        <div class="field">
          <label>名稱 *</label>
          <input type="text" id="f-name" value="${esc(item.name)}" placeholder="例如：Sony A7SIII">
        </div>
        <div class="field-row">
          <div class="field">
            <label>分類 *</label>
            <select id="f-category">${state.categories.map(c=>`<option ${c===item.category?'selected':''}>${esc(c)}</option>`).join('')}</select>
          </div>
          <div class="field">
            <label>狀況</label>
            <select id="f-condition">${CONDITIONS.map(c=>`<option ${c===item.condition?'selected':''}>${esc(c)}</option>`).join('')}</select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>品牌型號</label>
            <input type="text" id="f-brand" value="${esc(item.brand)}" placeholder="例如：Sony / A7SIII">
          </div>
          <div class="field">
            <label>資產編號</label>
            <input type="text" id="f-code" value="${esc(item.code)}" placeholder="例如：CAM-014">
          </div>
        </div>
        <div class="field">
          <label>存放位置</label>
          <input type="text" id="f-location" value="${esc(item.location)}" placeholder="例如：A棚器材櫃 2 號">
        </div>
        <div class="field-row">
          <div class="field">
            <label>群組名稱（選填）</label>
            <input type="text" id="f-group" value="${esc(item.groupName||'')}" placeholder="例如：圍裙">
            <div class="qty-field-hint">同群組名稱的品項會自動加總、方便一起查看（例如白/黑/咖啡/藍圍裙都填「圍裙」）。</div>
          </div>
          <div class="field">
            <label>數量（選填）</label>
            ${editing
              ? `<input type="number" id="f-quantity" value="${esc(item.quantity===undefined?'':item.quantity)}" disabled style="opacity:0.6;">
                 <div class="qty-field-hint">數量請至詳細頁面用「進貨 / 耗損 / 盤點修正」更動，才能保留紀錄。</div>`
              : `<input type="number" id="f-quantity" min="0" value="${esc(item.quantity)}" placeholder="例如：3">
                 <div class="qty-field-hint">若這件器材需要追蹤庫存數量（例如剪刀、圍裙），在這裡填入建檔時的初始數量。</div>`
            }
          </div>
        </div>
        <div class="field">
          <label>低庫存門檻（選填）</label>
          <input type="number" id="f-threshold" min="0" value="${esc(item.lowStockThreshold===undefined?'':item.lowStockThreshold)}" placeholder="例如：2（數量低於或等於這個值時會提醒）">
        </div>
        <div class="field-row">
          <div class="field">
            <label>購入日期</label>
            <input type="date" id="f-purchase" value="${esc(item.purchaseDate)}">
          </div>
          <div class="field">
            <label>原價 (NT$)</label>
            <input type="number" id="f-price" value="${esc(item.price)}" placeholder="0">
          </div>
        </div>
        <div class="field">
          <label>備註</label>
          <textarea id="f-notes" placeholder="配件、注意事項等...">${esc(item.notes)}</textarea>
        </div>
        <div class="modal-actions">
          <button class="btn" id="btn-cancel-form">取消</button>
          <button class="btn btn-primary" id="btn-save-form">儲存</button>
        </div>
      </div>
    `);

    document.getElementById('close-form').addEventListener('click', closeModal);
    document.getElementById('btn-cancel-form').addEventListener('click', closeModal);
    document.getElementById('btn-take-photo').addEventListener('click', ()=> document.getElementById('photo-input').click());

    const removeBtn = document.getElementById('btn-remove-photo');
    if (removeBtn) removeBtn.addEventListener('click', ()=>{
      removePhoto = true;
      pendingPhotoDataUrl = null;
      document.getElementById('photo-preview').innerHTML = '<span class="ph-icon">尚無照片</span>';
    });

    document.getElementById('photo-input').addEventListener('change', async (e)=>{
      const file = e.target.files[0];
      if (!file) return;
      document.getElementById('photo-preview').innerHTML = '<span class="ph-icon">處理中...</span>';
      try {
        pendingPhotoDataUrl = await compressImage(file);
        removePhoto = false;
        document.getElementById('photo-preview').innerHTML = `<img src="${pendingPhotoDataUrl}"/>`;
      } catch(err){
        toast('照片處理失敗，請再試一次');
        document.getElementById('photo-preview').innerHTML = '<span class="ph-icon">尚無照片</span>';
      }
    });

    document.getElementById('btn-save-form').addEventListener('click', async ()=>{
      const name = document.getElementById('f-name').value.trim();
      if (!name){ toast('請輸入名稱'); return; }
      const saveBtn = document.getElementById('btn-save-form');
      saveBtn.disabled = true; saveBtn.textContent = '儲存中...';

      const groupName = document.getElementById('f-group').value.trim();
      const rawQty = document.getElementById('f-quantity').value;
      const rawThreshold = document.getElementById('f-threshold').value;

      const data = {
        id: editing ? item.id : uid(),
        name,
        category: document.getElementById('f-category').value,
        brand: document.getElementById('f-brand').value.trim(),
        code: document.getElementById('f-code').value.trim(),
        location: document.getElementById('f-location').value.trim(),
        groupName: groupName,
        lowStockThreshold: rawThreshold === '' ? '' : Number(rawThreshold),
        purchaseDate: document.getElementById('f-purchase').value,
        price: document.getElementById('f-price').value,
        condition: document.getElementById('f-condition').value,
        notes: document.getElementById('f-notes').value.trim(),
        hasPhoto: pendingPhotoDataUrl ? true : (removePhoto ? false : !!item.hasPhoto),
        createdAt: editing ? item.createdAt : Date.now()
      };

      if (editing){
        // quantity & log are only changed via the stock-movement modal, never overwritten here
        data.quantity = item.quantity === undefined ? '' : item.quantity;
        data.quantityLog = item.quantityLog || [];
      } else {
        if (rawQty === '' || rawQty === null){
          data.quantity = '';
          data.quantityLog = [];
        } else {
          const initQty = Number(rawQty);
          data.quantity = initQty;
          data.quantityLog = [{ id: uid(), date: todayStr(), type:'initial', delta: initQty, quantityAfter: initQty, note:'建檔初始數量', createdAt: Date.now() }];
        }
      }

      try {
        if (pendingPhotoDataUrl){
          await window.storage.set('photo:'+data.id, pendingPhotoDataUrl, SHARED);
        } else if (removePhoto){
          try { await window.storage.delete('photo:'+data.id, SHARED); } catch(e){}
        }
        if (editing){
          const idx = state.equipment.findIndex(i=>i.id===item.id);
          state.equipment[idx] = data;
        } else {
          state.equipment.push(data);
        }
        await saveData();
        closeModal();
        render();
        toast(editing ? '已更新器材' : '已新增器材');
      } catch(err){
        toast('儲存失敗，請再試一次');
        saveBtn.disabled = false; saveBtn.textContent = '儲存';
      }
    });

    if (editing && item.hasPhoto){
      window.storage.get('photo:'+id, SHARED).then(res=>{
        const preview = document.getElementById('photo-preview');
        if (preview && res && res.value) preview.innerHTML = `<img src="${res.value}"/>`;
      }).catch(()=>{
        const preview = document.getElementById('photo-preview');
        if (preview) preview.innerHTML = '<span class="ph-icon">尚無照片</span>';
      });
    }
  }

  // ---------- Project form ----------
  function openProjectForm(id){
    const editing = !!id;
    const project = editing ? state.projects.find(p=>p.id===id) : {
      name:'', startDate: todayStr(), endDate: todayStr(), notes:'', itemIds: []
    };
    let selectedIds = new Set(project.itemIds);

    function conflictsFor(itemId, startDate, endDate){
      return state.projects.filter(p => p.id !== (editing?project.id:null) && p.itemIds.includes(itemId) && overlaps(p.startDate,p.endDate,startDate,endDate));
    }

    function renderChecklist(filterText){
      const start = document.getElementById('p-start') ? document.getElementById('p-start').value : project.startDate;
      const end = document.getElementById('p-end') ? document.getElementById('p-end').value : project.endDate;
      const q = (filterText||'').toLowerCase();
      let items = state.equipment.slice().sort((a,b)=>a.name.localeCompare(b.name));
      if (q) items = items.filter(i=>(i.name+i.code).toLowerCase().includes(q));
      const list = document.getElementById('item-checklist');
      if (items.length === 0){ list.innerHTML = '<div class="hint-text" style="padding:10px;">尚未建立任何器材，請先到「器材清單」新增。</div>'; return; }
      list.innerHTML = items.map(i=>{
        const checked = selectedIds.has(i.id);
        const conflicts = (start && end) ? conflictsFor(i.id, start, end) : [];
        return `
        <div class="check-row">
          <input type="checkbox" data-id="${i.id}" ${checked?'checked':''}>
          <div>
            <div class="ci-name">${esc(i.name)}</div>
            <div class="ci-code">${esc(i.code||'')} ${i.category?'· '+esc(i.category):''}</div>
            ${conflicts.length ? `<div class="ci-conflict">⚠ 與「${esc(conflicts[0].name)}」檔期重疊</div>` : ''}
          </div>
        </div>`;
      }).join('');
      list.querySelectorAll('input[type=checkbox]').forEach(cb=>{
        cb.addEventListener('change', ()=>{
          if (cb.checked) selectedIds.add(cb.dataset.id); else selectedIds.delete(cb.dataset.id);
        });
      });
    }

    openModal(`
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${editing?'編輯拍攝計畫':'新增拍攝計畫'}</div>
          <button class="close-x" id="close-form">&times;</button>
        </div>
        <div class="field"><label>計畫名稱 *</label><input type="text" id="p-name" value="${esc(project.name)}" placeholder="例如：品牌形象廣告 - 8月檔"></div>
        <div class="field-row">
          <div class="field"><label>開始日期 *</label><input type="date" id="p-start" value="${esc(project.startDate)}"></div>
          <div class="field"><label>結束日期 *</label><input type="date" id="p-end" value="${esc(project.endDate)}"></div>
        </div>
        <div class="field"><label>備註</label><textarea id="p-notes" placeholder="拍攝地點、聯絡窗口等...">${esc(project.notes)}</textarea></div>
        <div class="field">
          <label>選擇器材</label>
          <input type="text" class="search-input" id="checklist-search" placeholder="搜尋器材..." style="margin-bottom:8px;">
          <div class="item-checklist" id="item-checklist"></div>
          <div class="hint-text">勾選的器材在這段日期會顯示為「已預約/使用中」。若有紅色警示，代表與其他計畫檔期重疊，仍可儲存，請自行確認是否要調整。</div>
        </div>
        <div class="modal-actions">
          ${editing ? '<button class="btn btn-danger btn-sm" id="btn-delete-project" style="margin-right:auto;">刪除計畫</button>' : ''}
          <button class="btn" id="btn-cancel-form">取消</button>
          <button class="btn btn-primary" id="btn-save-form">儲存</button>
        </div>
      </div>
    `);

    renderChecklist('');
    document.getElementById('checklist-search').addEventListener('input', (e)=> renderChecklist(e.target.value));
    document.getElementById('p-start').addEventListener('change', ()=> renderChecklist(document.getElementById('checklist-search').value));
    document.getElementById('p-end').addEventListener('change', ()=> renderChecklist(document.getElementById('checklist-search').value));

    document.getElementById('close-form').addEventListener('click', closeModal);
    document.getElementById('btn-cancel-form').addEventListener('click', closeModal);

    const delBtn = document.getElementById('btn-delete-project');
    if (delBtn) delBtn.addEventListener('click', async ()=>{
      if (!confirm('確定要刪除這個拍攝計畫嗎？')) return;
      state.projects = state.projects.filter(p=>p.id!==project.id);
      await saveData();
      closeModal();
      render();
      toast('已刪除計畫');
    });

    document.getElementById('btn-save-form').addEventListener('click', async ()=>{
      const name = document.getElementById('p-name').value.trim();
      const start = document.getElementById('p-start').value;
      const end = document.getElementById('p-end').value;
      if (!name){ toast('請輸入計畫名稱'); return; }
      if (!start || !end){ toast('請選擇開始與結束日期'); return; }
      if (end < start){ toast('結束日期不能早於開始日期'); return; }

      const saveBtn = document.getElementById('btn-save-form');
      saveBtn.disabled = true; saveBtn.textContent = '儲存中...';

      const data = {
        id: editing ? project.id : uid(),
        name, startDate: start, endDate: end,
        notes: document.getElementById('p-notes').value.trim(),
        itemIds: Array.from(selectedIds),
        createdAt: editing ? project.createdAt : Date.now()
      };

      try {
        if (editing){
          const idx = state.projects.findIndex(p=>p.id===project.id);
          state.projects[idx] = data;
        } else {
          state.projects.push(data);
        }
        await saveData();
        closeModal();
        render();
        toast(editing ? '已更新計畫' : '已建立計畫');
      } catch(err){
        toast('儲存失敗，請再試一次');
        saveBtn.disabled = false; saveBtn.textContent = '儲存';
      }
    });
  }

  // ---------- Category manager ----------
  function openCategoryManager(){
    let editingCat = null;
    function countInCategory(cat){ return state.equipment.filter(i=>i.category===cat).length; }

    function renderList(){
      const list = document.getElementById('cat-manage-list');
      list.innerHTML = state.categories.map(c=>{
        const n = countInCategory(c);
        if (editingCat === c){
          return `
          <div class="cat-manage-row">
            <div class="cat-edit-row">
              <input type="text" id="cat-edit-input" value="${esc(c)}">
              <button class="btn btn-primary btn-sm" id="cat-edit-save" data-old="${esc(c)}">儲存</button>
              <button class="btn btn-sm" id="cat-edit-cancel">取消</button>
            </div>
          </div>`;
        }
        return `
        <div class="cat-manage-row">
          <span>${esc(c)}${n>0 ? `<span class="cm-count">${n} 件使用中</span>` : ''}</span>
          <div class="cm-actions">
            <button class="cat-edit-btn" data-cat="${esc(c)}" title="改名">✎</button>
            <button class="cat-remove-btn" data-cat="${esc(c)}" title="刪除">&times;</button>
          </div>
        </div>`;
      }).join('');

      list.querySelectorAll('.cat-edit-btn').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          editingCat = btn.dataset.cat;
          renderList();
          const input = document.getElementById('cat-edit-input');
          if (input){ input.focus(); input.select(); }
        });
      });

      const editInput = document.getElementById('cat-edit-input');
      if (editInput){
        editInput.addEventListener('keydown', (e)=>{
          if (e.key === 'Enter') document.getElementById('cat-edit-save').click();
          if (e.key === 'Escape'){ editingCat = null; renderList(); }
        });
      }
      const saveBtn = document.getElementById('cat-edit-save');
      if (saveBtn) saveBtn.addEventListener('click', async ()=>{
        const oldName = saveBtn.dataset.old;
        const newName = document.getElementById('cat-edit-input').value.trim();
        if (!newName){ toast('分類名稱不能空白'); return; }
        if (newName !== oldName && state.categories.includes(newName)){ toast('這個分類名稱已經存在'); return; }
        if (newName === oldName){ editingCat = null; renderList(); return; }

        const idx = state.categories.indexOf(oldName);
        state.categories[idx] = newName;
        state.equipment.forEach(i=>{ if (i.category === oldName) i.category = newName; });
        if (activeCategory === oldName) activeCategory = newName;
        await saveData();
        editingCat = null;
        renderList();
        render();
        toast('已更新分類名稱');
      });
      const cancelBtn = document.getElementById('cat-edit-cancel');
      if (cancelBtn) cancelBtn.addEventListener('click', ()=>{ editingCat = null; renderList(); });

      list.querySelectorAll('.cat-remove-btn').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const cat = btn.dataset.cat;
          if (state.categories.length <= 1){ toast('至少要保留一個分類'); return; }
          const n = countInCategory(cat);
          const msg = n > 0
            ? `目前有 ${n} 件器材使用「${cat}」這個分類，刪除後這些器材仍會保留原本的分類文字，只是清單篩選中不會再看到這個選項。確定要刪除嗎？`
            : `確定要刪除分類「${cat}」嗎？`;
          if (!confirm(msg)) return;
          state.categories = state.categories.filter(c=>c!==cat);
          await saveData();
          renderList();
          render();
          toast('已刪除分類');
        });
      });
    }

    openModal(`
      <div class="modal" style="max-width:420px;">
        <div class="modal-header">
          <div class="modal-title">管理分類</div>
          <button class="close-x" id="close-cat">&times;</button>
        </div>
        <div id="cat-manage-list"></div>
        <div class="cat-add-row">
          <input type="text" id="cat-new-input" placeholder="新增分類，例如：燈光配件">
          <button class="btn btn-primary btn-sm" id="cat-add-btn">新增</button>
        </div>
        <div class="hint-text">分類可以依照你的使用習慣自由增減，未來還能隨時調整。</div>
        <div class="modal-actions">
          <button class="btn" id="cat-done-btn">完成</button>
        </div>
      </div>
    `);
    renderList();
    document.getElementById('close-cat').addEventListener('click', closeModal);
    document.getElementById('cat-done-btn').addEventListener('click', closeModal);
    document.getElementById('cat-add-btn').addEventListener('click', async ()=>{
      const input = document.getElementById('cat-new-input');
      const name = input.value.trim();
      if (!name){ toast('請輸入分類名稱'); return; }
      if (state.categories.includes(name)){ toast('這個分類已經存在'); return; }
      state.categories.push(name);
      await saveData();
      input.value = '';
      renderList();
      render();
      toast('已新增分類');
    });
  }

  // ---------- init ----------
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      activeTab = t.dataset.tab;
      render();
    });
  });
  document.getElementById('search-input').addEventListener('input', render);
  document.getElementById('status-filter').addEventListener('change', render);
  document.getElementById('btn-add-main').addEventListener('click', ()=>{
    if (activeTab === 'equipment') openEquipmentForm(null); else openProjectForm(null);
  });

  (async function init(){
    await loadData();
    render();
  })();
})();
</script>
